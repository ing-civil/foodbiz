{% extends "base.html" %}
{% block content %}
<h1>Registrar envío (Centro → Punto de venta)</h1>

<form method="post">
  <div class="card">
    <input name="note" placeholder="Nota (opcional): Ej. envío mañana, recién horneado...">
  </div>

  <div class="grid">
    {% for cat, items in grouped.items() %}
      <div class="card col6">
        <h3>{{ cat }}</h3>
        <table>
          <tr><th>Producto</th><th>Enviar</th></tr>
          {% for it in items %}
            <tr>
              <td>{{ it["name"] }}</td>
              <td style="width:140px"><input type="number" min="0" name="qty_{{ it['id'] }}" value="0"></td>
            </tr>
          {% endfor %}
        </table>
      </div>
    {% endfor %}
    <div class="card col12">
      <button class="btn acc" type="submit">Guardar envío</button>
      <a class="btn" href="{{ url_for('inventory_home') }}">Volver</a>
    </div>
  </div>
</form>
{% endblock %}
