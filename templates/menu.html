{% extends "base.html" %}
{% block content %}
<h1>Menú / Catálogo</h1>

{% for cat, items in grouped.items() %}
  <div class="card">
    <h3>{{ cat }}</h3>
    <table>
      <tr><th>Producto</th><th>Precio</th></tr>
      {% for it in items %}
        <tr>
          <td>{{ it["name"] }}</td>
          <td><b>{{ it["price_cents"]|pesos }}</b></td>
        </tr>
      {% endfor %}
    </table>
  </div>
{% endfor %}

{% endblock %}
