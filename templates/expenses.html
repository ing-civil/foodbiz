{% extends "base.html" %}
{% block content %}
<h1>Egresos</h1>

<div class="grid">
  <div class="card col6">
    <h3>Registrar egreso</h3>
    <form method="post">
      <input name="concept" placeholder="Concepto (Gas, Huevo, etc.)" required>
      <input name="amount" placeholder="Monto (ej 350.00)" required>
      <input name="note" placeholder="Nota (opcional)">
      <button class="btn acc" type="submit">Guardar egreso</button>
    </form>
  </div>

  <div class="card col12">
    <h3>Últimos egresos</h3>
    <table>
      <tr><th>Fecha</th><th>Concepto</th><th>Monto</th><th>Nota</th></tr>
      {% for e in rows %}
        <tr>
          <td>{{ e["created_at"] }}</td>
          <td>{{ e["concept"] }}</td>
          <td><b>{{ e["amount_cents"]|pesos }}</b></td>
          <td class="muted">{{ e["note"] }}</td>
        </tr>
      {% endfor %}
    </table>
  </div>
</div>
{% endblock %}
